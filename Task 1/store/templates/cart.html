<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
</head>
<body>

<h1>Shopping Cart</h1>

{% for item in cart_items %}
<div>
    <h3>{{ item.product.name }}</h3>
    <p>Price: ₹{{ item.product.price }}</p>
    <p>Quantity: {{ item.quantity }}</p>
    <hr>
</div>
{% endfor %}

<h2>Total: ₹{{ total }}</h2>

<br>

<a href="/checkout/">
    <button>Place Order</button>
</a>

<a href="/">Continue Shopping</a>

</body>
</html>
